<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="0; url=vcc://vpm/addRepo?url=https%3A%2F%2Fnickel-jp.github.io%2Favatar-recovery-unity%2Findex.json">
  <title>Add Avatar Recovery Unity to VCC</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f6f8fb;
      color: #111827;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background: #f6f8fb;
    }

    main {
      width: min(42rem, calc(100vw - 2rem));
      padding: 2rem;
      border: 1px solid #d7dde8;
      border-radius: 12px;
      background: #ffffff;
      box-shadow: 0 24px 70px rgba(15, 23, 42, 0.12);
    }

    h1 {
      margin: 0 0 0.75rem;
      font-size: clamp(1.75rem, 4vw, 2.5rem);
      line-height: 1.1;
    }

    p {
      margin: 0 0 1.25rem;
      color: #475569;
      line-height: 1.65;
    }

    a.button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 2.75rem;
      padding: 0 1.1rem;
      border-radius: 8px;
      background: #2563eb;
      color: #ffffff;
      font-weight: 700;
      text-decoration: none;
    }

    code {
      color: #1d4ed8;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <main>
    <h1>Opening VCC...</h1>
    <p>If VRChat Creator Companion does not open automatically, click the button below.</p>
    <p>
      <a class="button" href="vcc://vpm/addRepo?url=https%3A%2F%2Fnickel-jp.github.io%2Favatar-recovery-unity%2Findex.json">Add Repository to VCC</a>
    </p>
    <p>Manual repository URL:<br><code>https://nickel-jp.github.io/avatar-recovery-unity/index.json</code></p>
  </main>
  <script>
    window.location.href = "vcc://vpm/addRepo?url=https%3A%2F%2Fnickel-jp.github.io%2Favatar-recovery-unity%2Findex.json";
  </script>
</body>
</html>
